      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
        "404":
          description: Host not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/hosts/{hostId}:
    delete:
      tags: [Admin]
      summary: Remove a host from their marina assignment
      operationId: adminRemoveHost
      security:
        - HostAuth: []
      parameters:
        - in: path
          name: hostId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Host removed
          content:
            application/json:
              schema:
