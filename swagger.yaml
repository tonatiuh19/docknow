                bookingId: { type: integer, nullable: true }
                marinaId: { type: integer, nullable: true }
                isMobileApp:
                  type: boolean
                  default: false
                  description: |
                    Set to `true` when calling from the mobile app.
                    When `true` the server resolves the Stripe secret key from the
                    `environment_keys` database table. When `false` or omitted the
                    server uses the `STRIPE_SECRET_KEY` environment variable (web default).
      responses:
        "200":
          description: Identity session created
          content:
            application/json:
              schema:
                type: object
