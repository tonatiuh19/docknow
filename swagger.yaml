        - HostAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [marinaId, hostId]
              properties:
                marinaId: { type: integer }
                hostId: { type: integer }
      responses:
        "200":
          description: Host removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
        "400":
          description: Cannot remove primary host
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /host/create-host:
    post:
      tags: [Host Management]
      summary: Create a new host account
      operationId: createHost
      security:
        - HostAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, fullName]
              properties:
                email: { type: string, format: email }
                fullName: { type: string }
                phone: { type: string, nullable: true }
                phoneCode: { type: string, nullable: true }
                countryCode: { type: string, nullable: true }
      responses:
        "200":
          description: Host created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
