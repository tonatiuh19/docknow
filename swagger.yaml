          description: Email already registered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  # ════════════════════════════════════════════════════════
  # ADMIN — HOST MANAGEMENT (new structure)
  # ════════════════════════════════════════════════════════
  /admin/hosts:
    get:
      tags: [Admin]
      summary: Get admin hosts view (assigned + available)
      operationId: adminGetHosts
      security:
        - HostAuth: []
      parameters:
        - in: query
          name: marinaId
          schema: { type: integer }
      responses:
        "200":
          description: Hosts data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  assignedHosts: { type: array, items: { type: object } }
                  availableHosts: { type: array, items: { type: object } }
                  marinaId: { nullable: true }
                  marinaName: { nullable: true }
        "403":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    post:
      tags: [Admin]
      summary: Create a new host user (admin)
      operationId: adminCreateHost
      security:
        - HostAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, fullName]
              properties:
                email: { type: string, format: email }
                fullName: { type: string }
                phone: { type: string, nullable: true }
                marinaId: { type: integer, nullable: true }
                role:
                  type: string
                  enum: [primary, manager]
                  default: manager
      responses:
        "200":
          description: Host created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
                  host: { $ref: "#/components/schemas/HostPublic" }
        "400":
          description: Email already exists
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/hosts/assign:
    post:
      tags: [Admin]
      summary: Assign an existing host to a marina
      operationId: adminAssignHost
      security:
        - HostAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [marinaId, hostId]
              properties:
                marinaId: { type: integer }
                hostId: { type: integer }
                role:
                  type: string
                  enum: [primary, manager]
                  default: manager
      responses:
        "200":
          description: Host assigned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  assignment:
                    type: object
                    properties:
                      hostId: { type: integer }
                      marinaId: { type: integer }
                      role: { type: string }
                      assignedAt: { type: string, format: date-time }
        "400":
          description: Host already assigned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/hosts/{hostId}/role:
    put:
      tags: [Admin]
      summary: Update a host's role at their current marina
      operationId: adminUpdateHostRole
      security:
        - HostAuth: []
      parameters:
        - in: path
          name: hostId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
