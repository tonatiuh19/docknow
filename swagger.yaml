  # ════════════════════════════════════════════════════════
  /host/manage-hosts:
    get:
      tags: [Host Management]
      summary: Get assigned and available hosts for a marina
      operationId: getManagedHosts
      security:
        - HostAuth: []
      parameters:
        - in: query
          name: marinaId
          schema: { type: integer }
      responses:
        "200":
          description: Assigned and available hosts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  assignedHosts: { type: array, items: { type: object } }
                  availableHosts: { type: array, items: { type: object } }
                  marinaId: { type: integer, nullable: true }
                  marinaName: { type: string, nullable: true }

  /host/assign-host:
    post:
      tags: [Host Management]
      summary: Assign a host to a marina
      operationId: assignHost
      security:
        - HostAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [marinaId, hostId]
              properties:
                marinaId: { type: integer }
                hostId: { type: integer }
      responses:
        "200":
          description: Host assigned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
        "403":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /host/update-host-role:
    put:
      tags: [Host Management]
      summary: Promote a host to primary at a marina
      operationId: updateHostRole
      security:
        - HostAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [marinaId, hostId]
              properties:
                marinaId: { type: integer }
                hostId: { type: integer }
                makePrimary: { type: boolean, default: false }
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }

  /host/remove-host:
    delete:
      tags: [Host Management]
