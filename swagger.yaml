                        date: { type: string, format: date }
                        total_visits: { type: integer }
                        unique_visitors: { type: integer }
                        mobile_visits: { type: integer }
                        desktop_visits: { type: integer }

  # ════════════════════════════════════════════════════════
  # ADMIN — ENVIRONMENT KEYS
  # Keys stored here are consumed by APP clients via GET /payments/config.
  # Web clients use server-side environment variables instead.
  # ════════════════════════════════════════════════════════
  /admin/environment-keys:
    get:
      tags: [Admin]
      summary: List all environment keys (secret values masked)
      operationId: getEnvironmentKeys
      description: |
        Returns all rows from the `environment_keys` table.

        **Why this table exists:** Mobile/app clients cannot read server environment
        variables, so Stripe keys are stored here and fetched at runtime via
        `GET /api/payments/config`. Web clients continue to use the hosting
        platform's environment variables (`STRIPE_SECRET_KEY`, etc.).

        **Security:** Secret key values are masked in the response — only the last
        4 characters are shown (e.g. `****************************abcd`).
        The full value is never returned by this endpoint.
      security:
        - HostAuth: []
      responses:
        "200":
          description: List of environment key rows (secrets masked)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/EnvironmentKey" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    post:
      tags: [Admin]
      summary: Create or update an environment key (upsert)
      operationId: upsertEnvironmentKey
      description: |
        Inserts a new row or updates the `key_string` of an existing row in the
        `environment_keys` table, matched by `(title, type, isTest)`.

        Use this to rotate Stripe keys for app clients **without a server re-deploy**.
        Web clients are unaffected — they use server environment variables.

        **Typical Stripe rows to manage:**
        - `{ title: "stripe", type: "publishable", isTest: true }` — test publishable key
        - `{ title: "stripe", type: "secret",      isTest: true }` — test secret key
        - `{ title: "stripe", type: "publishable", isTest: false }` — live publishable key
        - `{ title: "stripe", type: "secret",      isTest: false }` — live secret key
      security:
        - HostAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, type, keyString, isTest]
              properties:
                title:
                  type: string
                  description: "Service name (e.g. 'stripe')"
                  example: stripe
                type:
                  type: string
                  description: "Key type: publishable | secret | webhook"
                  enum: [publishable, secret, webhook]
                  example: publishable
                keyString:
                  type: string
                  description: "The full key value to store (e.g. pk_test_... or sk_test_...)"
                  example: "pk_test_51RTujEGdyWn9Nlx0..."
                isTest:
                  type: boolean
                  description: "true = test/sandbox key, false = live/production key"
                  example: true
      responses:
        "200":
          description: Key saved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message:
                    {
                      type: string,
                      example: "Environment key saved successfully",
                    }
        "400":
          description: Missing required fields
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/environment-keys/{id}:
    delete:
      tags: [Admin]
      summary: Delete an environment key by ID
      operationId: deleteEnvironmentKey
      description: |
        Permanently removes a row from the `environment_keys` table.

        > **Caution:** Deleting the active Stripe publishable key row will cause
        > `GET /api/payments/config` to return a 500 error for app clients until
        > a replacement row is inserted.
      security:
        - HostAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
          description: "Primary key (`id`) of the `environment_keys` row to delete"
      responses:
        "200":
          description: Key deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string, example: "Environment key deleted" }
        "400":
          description: Invalid ID
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

