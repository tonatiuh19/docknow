        "403":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Host not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
