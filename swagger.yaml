  # ════════════════════════════════════════════════════════
  # PAYMENTS CONFIG
  # ════════════════════════════════════════════════════════
  /payments/config:
    get:
      tags: [Payments]
      summary: Get Stripe publishable key for app clients
      operationId: getPaymentsConfig
      description: |
        **For mobile/app clients only.**

        Returns the Stripe publishable key that should be used to initialise the
        Stripe SDK on the app. The key is read from the `environment_keys` database
        table (not from server environment variables) so it can be rotated without
        a re-deploy.

        **Key selection:** The server looks up the row where
        `title = 'stripe'`, `type = 'publishable'`, and
        `is_test = (NODE_ENV !== 'production' ? 1 : 0)`.

        > **Web clients** do not need to call this endpoint — they initialise Stripe
        > using the `STRIPE_PUBLISHABLE_KEY` server environment variable which is
        > available at build/runtime on the hosting platform (Vercel / Netlify).
      responses:
        "200":
          description: Stripe publishable key for the active environment
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  publishable_key:
                    type: string
                    description: |
                      Stripe publishable key from the `environment_keys` table.
                      Starts with `pk_test_` in test mode and `pk_live_` in production.
                    example: "pk_test_51RTujEGdyWn9Nlx0..."
        "500":
          description: Stripe publishable key is not configured in the database
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  # ════════════════════════════════════════════════════════
